[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --maxfail=1

markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    performance: Performance tests



; 🧪 pytest.ini
; This file sets the rules for testing your code.
; It tells the test tool where tests live, how they’re named, and what reports to generate.
; It helps catch bugs early and proves your app works as expected.