<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Stacker — Monster Resort Concierge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       CSS Reset & Base
       ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2234;
      --bg-elevated: #1e293b;
      --border: #2a3548;
      --border-light: #374357;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-green: #22c55e;
      --accent-green-dim: rgba(34, 197, 94, 0.15);
      --accent-red: #ef4444;
      --accent-red-dim: rgba(239, 68, 68, 0.15);
      --accent-blue: #3b82f6;
      --accent-purple: #a855f7;
      --accent-orange: #f97316;
      --accent-cyan: #06b6d4;
      --accent-pink: #ec4899;
      --accent-yellow: #eab308;
      --cat-config: #a855f7;
      --cat-storage: #f97316;
      --cat-knowledge: #06b6d4;
      --cat-tools: #22c55e;
      --cat-infrastructure: #ef4444;
      --cat-llm: #ec4899;
      --cat-monitoring: #eab308;
      --cat-agent: #3b82f6;
      --font-code: 'JetBrains Mono', monospace;
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    html { font-size: 15px; }
    body {
      font-family: var(--font-ui);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s;
    }

    body.wrong-flash {
      background: #1a0a0a !important;
    }

    /* ============================================================
       Layout
       ============================================================ */
    .game-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .game-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .game-title h1 {
      font-size: 1.35rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .game-title .subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    #game-timer {
      font-family: var(--font-code);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-card);
      padding: 6px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      min-width: 72px;
      text-align: center;
    }

    /* Progress bar */
    .progress-wrapper {
      margin-bottom: 16px;
    }

    .progress-bar-track {
      height: 6px;
      background: var(--bg-card);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    #game-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }

    #game-progress-bar::after {
      content: '';
      position: absolute;
      right: 0;
      top: -2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 10px var(--accent-green);
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    #game-progress-text {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      font-family: var(--font-code);
    }

    /* Score cards */
    .score-strip {
      display: flex;
      gap: 10px;
    }

    .score-card {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius);
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .score-card .label { color: var(--text-muted); }
    .score-card .value { font-family: var(--font-code); }
    .score-card.correct .value { color: var(--accent-green); }
    .score-card.wrong .value   { color: var(--accent-red); }
    .score-card.streak .value  { color: var(--accent-yellow); }
    .score-card.accuracy .value { color: var(--accent-cyan); }

    /* Main area: two columns */
    .game-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    /* ============================================================
       Code Stack (left column)
       ============================================================ */
    .code-stack-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .editor-titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .editor-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .editor-dot.red    { background: #ef4444; }
    .editor-dot.yellow { background: #eab308; }
    .editor-dot.green  { background: #22c55e; }

    .editor-filename {
      font-family: var(--font-code);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 8px;
    }

    #code-stack {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 12px 0;
      overflow-y: auto;
      overflow-x: auto;
      font-family: var(--font-code);
      font-size: 0.8rem;
      line-height: 1.7;
      min-height: 300px;
      max-height: calc(100vh - 240px);
    }

    #code-stack::-webkit-scrollbar { width: 6px; }
    #code-stack::-webkit-scrollbar-track { background: transparent; }
    #code-stack::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .code-stack-line {
      display: flex;
      align-items: flex-start;
      padding: 1px 16px 1px 0;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s, transform 0.35s, background 0.5s;
    }

    .code-stack-line.placed {
      opacity: 1;
      transform: translateY(0);
    }

    .code-stack-line.slide-in.placed {
      animation: lineGlow 1s ease-out;
    }

    @keyframes lineGlow {
      0%   { background: var(--accent-green-dim); }
      100% { background: transparent; }
    }

    .code-line-number {
      display: inline-block;
      min-width: 40px;
      text-align: right;
      padding-right: 16px;
      padding-left: 12px;
      color: var(--text-muted);
      user-select: none;
      flex-shrink: 0;
      font-size: 0.72rem;
      opacity: 0.6;
    }

    .code-stack-line code {
      white-space: pre;
      color: var(--text-primary);
    }

    /* ============================================================
       Options Panel (right column)
       ============================================================ */
    .options-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .options-header {
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    #options-container {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .option-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
      font-family: var(--font-code);
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--text-primary);
      text-align: left;
      width: 100%;
      position: relative;
    }

    .option-card:hover:not(:disabled) {
      border-color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.06);
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(59, 130, 246, 0.12);
    }

    .option-card:active:not(:disabled) {
      transform: translateY(0);
    }

    .option-card:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .option-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      border-radius: 5px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .option-card code {
      white-space: pre-wrap;
      word-break: break-all;
      flex: 1;
    }

    .option-check {
      display: none;
      color: var(--accent-green);
      font-size: 1.1rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .option-card.correct {
      border-color: var(--accent-green);
      background: var(--accent-green-dim);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
    }

    .option-card.correct .option-check { display: inline; }
    .option-card.correct .option-key {
      background: var(--accent-green);
      color: #fff;
      border-color: var(--accent-green);
    }

    /* Shake animation */
    .option-card.shake {
      animation: shake 0.45s ease-in-out;
      border-color: var(--accent-red);
      background: var(--accent-red-dim);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%  { transform: translateX(-8px); }
      30%  { transform: translateX(7px); }
      45%  { transform: translateX(-6px); }
      60%  { transform: translateX(5px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(2px); }
    }

    /* ============================================================
       Info Panel (slides in from right)
       ============================================================ */
    #info-panel {
      position: fixed;
      top: 0; right: 0;
      width: 360px;
      height: 100vh;
      background: var(--bg-elevated);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 40px rgba(0, 0, 0, 0.5);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 100;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      cursor: pointer;
    }

    #info-panel.visible {
      transform: translateX(0);
    }

    .info-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    #info-explanation {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-primary);
    }

    #info-file {
      font-family: var(--font-code);
      font-size: 0.75rem;
      color: var(--accent-cyan);
    }

    #info-category {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .info-advance-hint {
      margin-top: auto;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.7;
    }

    /* Category color coding for info badge */
    .cat-config           { background: rgba(168, 85, 247, 0.2); color: var(--cat-config); }
    .cat-storage          { background: rgba(249, 115, 22, 0.2); color: var(--cat-storage); }
    .cat-knowledge        { background: rgba(6, 182, 212, 0.2); color: var(--cat-knowledge); }
    .cat-tools            { background: rgba(34, 197, 94, 0.2); color: var(--cat-tools); }
    .cat-infrastructure   { background: rgba(239, 68, 68, 0.2); color: var(--cat-infrastructure); }
    .cat-llm              { background: rgba(236, 72, 153, 0.2); color: var(--cat-llm); }
    .cat-monitoring       { background: rgba(234, 179, 8, 0.2); color: var(--cat-monitoring); }
    .cat-agent-validation,
    .cat-agent-rag,
    .cat-agent-prompt,
    .cat-agent-memory,
    .cat-agent-llm-call,
    .cat-agent-tools,
    .cat-agent-synthesis,
    .cat-agent-confidence,
    .cat-agent-output     { background: rgba(59, 130, 246, 0.2); color: var(--cat-agent); }

    /* ============================================================
       Hint Popup
       ============================================================ */
    #hint-popup {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-elevated);
      border: 1px solid var(--accent-red);
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 0.8rem;
      color: var(--accent-red);
      font-weight: 500;
      box-shadow: 0 4px 24px rgba(239, 68, 68, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      max-width: 500px;
      text-align: center;
    }

    #hint-popup.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    /* ============================================================
       Completion Screen
       ============================================================ */
    #completion-screen {
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 23, 0.95);
      backdrop-filter: blur(12px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #completion-screen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .completion-content {
      text-align: center;
      animation: completionPop 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes completionPop {
      0%   { opacity: 0; transform: scale(0.85) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .completion-content h2 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
    }

    .completion-stats {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .stat-value {
      font-family: var(--font-code);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent-green);
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .completion-grade {
      margin-bottom: 32px;
    }

    .grade {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .grade-s { color: #fbbf24; text-shadow: 0 0 30px rgba(251, 191, 36, 0.5); }
    .grade-a { color: var(--accent-green); text-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
    .grade-b { color: var(--accent-cyan); }
    .grade-c { color: var(--accent-orange); }
    .grade-d { color: var(--text-muted); }

    .play-again-btn {
      padding: 12px 36px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }

    .play-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(34, 197, 94, 0.4);
    }

    /* Confetti overlay */
    #completion-screen.visible::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 20%, var(--accent-green) 1px, transparent 1px),
        radial-gradient(circle at 45% 10%, var(--accent-cyan) 1.5px, transparent 1.5px),
        radial-gradient(circle at 70% 15%, var(--accent-yellow) 1px, transparent 1px),
        radial-gradient(circle at 85% 25%, var(--accent-pink) 1.2px, transparent 1.2px),
        radial-gradient(circle at 25% 80%, var(--accent-purple) 1px, transparent 1px),
        radial-gradient(circle at 60% 85%, var(--accent-orange) 1.5px, transparent 1.5px),
        radial-gradient(circle at 90% 75%, var(--accent-green) 1px, transparent 1px),
        radial-gradient(circle at 10% 55%, var(--accent-cyan) 1.2px, transparent 1.2px),
        radial-gradient(circle at 35% 45%, var(--accent-yellow) 0.8px, transparent 0.8px),
        radial-gradient(circle at 80% 50%, var(--accent-pink) 1px, transparent 1px);
      background-size: 100% 100%;
      opacity: 0.4;
      animation: confettiFade 3s ease-out forwards;
      pointer-events: none;
    }

    @keyframes confettiFade {
      0%   { opacity: 0.6; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(40px); }
    }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 900px) {
      .game-main {
        grid-template-columns: 1fr;
      }

      #code-stack {
        max-height: 35vh;
        min-height: 200px;
      }

      #info-panel {
        width: 100%;
      }

      .game-header { flex-direction: column; align-items: flex-start; }
      .score-strip { flex-wrap: wrap; }
    }

    @media (max-width: 600px) {
      html { font-size: 13px; }
      .game-container { padding: 10px 12px; }
      .completion-stats { gap: 14px; }
      .stat-value { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="game-container">

    <!-- Header -->
    <div class="game-header">
      <div class="game-title">
        <div>
          <h1>Code Stacker</h1>
          <div class="subtitle">Build build_app() + _agent_reply() line by line</div>
        </div>
      </div>
      <div id="game-timer">00:00</div>
    </div>

    <!-- Progress -->
    <div class="progress-wrapper">
      <div class="progress-bar-track">
        <div id="game-progress-bar"></div>
      </div>
      <div class="progress-meta">
        <div id="game-progress-text">0 / 28</div>
        <div class="score-strip">
          <div class="score-card correct">
            <span class="label">Correct</span>
            <span class="value" id="game-score-correct">0</span>
          </div>
          <div class="score-card wrong">
            <span class="label">Wrong</span>
            <span class="value" id="game-score-wrong">0</span>
          </div>
          <div class="score-card streak">
            <span class="label">Streak</span>
            <span class="value" id="game-score-streak">0</span>
          </div>
          <div class="score-card accuracy">
            <span class="label">Accuracy</span>
            <span class="value" id="game-score-accuracy">100%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Main two-column area -->
    <div class="game-main">

      <!-- Left: Code Stack -->
      <div class="code-stack-wrapper">
        <div class="editor-titlebar">
          <div class="editor-dot red"></div>
          <div class="editor-dot yellow"></div>
          <div class="editor-dot green"></div>
          <span class="editor-filename">app/main.py</span>
        </div>
        <div id="code-stack"></div>
      </div>

      <!-- Right: Options -->
      <div class="options-wrapper">
        <div class="options-header" id="options-question">Pick the next line of code  (1-4)</div>
        <div id="options-container"></div>
      </div>

    </div>
  </div>

  <!-- Info Panel (slides from right) -->
  <div id="info-panel">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--accent-green);color:#fff;border-radius:50%;font-size:14px;font-weight:800;">&#10003;</span>
      <span style="font-size:15px;font-weight:700;color:var(--accent-green);">Correct!</span>
    </div>
    <div class="info-label">The Code</div>
    <div id="info-code" style="background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:#79c0ff;line-height:1.7;overflow-x:auto;margin-bottom:14px;white-space:pre-wrap;"></div>

  <!-- Category badge styling (applied dynamically) -->
  <script>
    // Apply category color class to info-category badge when info panel is shown
    (function() {
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          if (m.attributeName === 'class') {
            var panel = document.getElementById('info-panel');
            var badge = document.getElementById('info-category');
            if (panel && badge && panel.classList.contains('visible')) {
              var cat = badge.textContent.trim().toLowerCase();
              badge.className = '';
              var cls = 'cat-' + cat;
              badge.classList.add(cls);
            }
          }
        });
      });
      var panel = document.getElementById('info-panel');
      if (panel) observer.observe(panel, { attributes: true });
    })();
  </script>
