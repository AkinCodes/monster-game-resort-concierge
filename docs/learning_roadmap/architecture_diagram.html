<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Diagram — Monster Resort Concierge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07060d;
  --surface: #0f0d1a;
  --card: #151225;
  --card-hover: #1d1935;
  --border: #2a2645;
  --text: #e2e0f0;
  --text-muted: #8b85b0;
  --text-dim: #5a5578;
  --code-bg: #0d0b18;
  --radius: 14px;
  --radius-sm: 8px;
}
html { font-size: 16px; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}
code, pre, .mono { font-family: 'JetBrains Mono', monospace; }

/* ========== DOT GRID BACKGROUND ========== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(99,102,241,0.1) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
  z-index: 0;
}
/* Radial glow behind the graph */
body::after {
  content: '';
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 900px;
  height: 700px;
  background: radial-gradient(ellipse, rgba(99,102,241,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ========== HEADER ========== */
.page-header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 2rem 1rem 1rem;
  background: linear-gradient(180deg, rgba(99,102,241,0.06) 0%, transparent 100%);
  border-bottom: 1px solid rgba(99,102,241,0.12);
}
.page-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #a78bfa 0%, #00e5ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-header p {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
}
.page-header .fn-label {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: #00e5ff;
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.18);
  border-radius: 6px;
  padding: 0.15rem 0.7rem;
  margin-top: 0.6rem;
}

/* ========== GRAPH CONTAINER ========== */
.graph-container {
  position: relative;
  width: 100%;
  max-width: 1100px;
  height: 720px;
  margin: 2rem auto;
  z-index: 1;
}

/* ========== SVG LAYER ========== */
.svg-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
  overflow: visible;
}

/* ========== NODES ========== */
.node {
  position: absolute;
  z-index: 5;
  cursor: pointer;
  transition: opacity 0.4s ease, transform 0.3s ease, box-shadow 0.3s ease, filter 0.4s ease;
  border-radius: var(--radius);
  background: var(--card);
  border: 1.5px solid var(--border);
  padding: 0.65rem 0.9rem;
  display: flex;
  align-items: center;
  gap: 0.55rem;
  user-select: none;
  min-width: 135px;
  backdrop-filter: blur(8px);
}
/* Glow ring behind node */
.node::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 18px;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: -1;
  pointer-events: none;
}
.node:hover { transform: translate(-50%, -50%) translateY(-3px) !important; }
.node:hover::after { opacity: 1; }

.node .icon {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.05rem;
  flex-shrink: 0;
  transition: transform 0.3s ease;
}
.node:hover .icon { transform: scale(1.1); }

.node .info { flex: 1; min-width: 0; }
.node .info .name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.73rem;
  font-weight: 600;
  white-space: nowrap;
  line-height: 1.3;
}
.node .info .desc {
  font-size: 0.62rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

/* Breathing glow */
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 0px transparent; }
  50% { box-shadow: var(--glow); }
}
.node { animation: breathe 4s ease-in-out infinite; }
/* Offset animation timing per node for organic feel */
.node:nth-child(2) { animation-delay: 0.4s; }
.node:nth-child(3) { animation-delay: 0.8s; }
.node:nth-child(4) { animation-delay: 1.2s; }
.node:nth-child(5) { animation-delay: 1.6s; }
.node:nth-child(6) { animation-delay: 2.0s; }
.node:nth-child(7) { animation-delay: 2.4s; }
.node:nth-child(8) { animation-delay: 2.8s; }
.node:nth-child(9) { animation-delay: 3.2s; }
.node:nth-child(10) { animation-delay: 3.6s; }

/* _agent_reply — BIGGEST node */
.node[data-id="_agent_reply"] {
  min-width: 200px;
  padding: 0.9rem 1.3rem;
  border-width: 2px;
  z-index: 6;
  background: linear-gradient(135deg, #0d1a2a, #0f1525);
}
.node[data-id="_agent_reply"] .icon { width: 44px; height: 44px; font-size: 1.4rem; }
.node[data-id="_agent_reply"] .info .name { font-size: 0.88rem; }
.node[data-id="_agent_reply"] .info .desc { font-size: 0.7rem; }

/* registry — BIGGER node (hub) */
.node[data-id="registry"] {
  min-width: 170px;
  padding: 0.8rem 1.1rem;
  border-width: 2px;
  z-index: 6;
}
.node[data-id="registry"] .icon { width: 38px; height: 38px; font-size: 1.2rem; }
.node[data-id="registry"] .info .name { font-size: 0.82rem; }
.node[data-id="registry"] .info .desc { font-size: 0.66rem; }

/* Per-node colors: border, glow, icon bg, glow-ring */
.node[data-id="settings"] { border-color: rgba(245,158,11,0.35); --glow: 0 0 24px rgba(245,158,11,0.12); }
.node[data-id="settings"]::after { background: radial-gradient(circle, rgba(245,158,11,0.12), transparent 70%); }
.node[data-id="settings"] .icon { background: rgba(245,158,11,0.12); color: #f59e0b; }

.node[data-id="db"] { border-color: rgba(59,130,246,0.35); --glow: 0 0 24px rgba(59,130,246,0.12); }
.node[data-id="db"]::after { background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%); }
.node[data-id="db"] .icon { background: rgba(59,130,246,0.12); color: #3b82f6; }

.node[data-id="pdf"] { border-color: rgba(139,92,246,0.35); --glow: 0 0 24px rgba(139,92,246,0.12); }
.node[data-id="pdf"]::after { background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%); }
.node[data-id="pdf"] .icon { background: rgba(139,92,246,0.12); color: #8b5cf6; }

.node[data-id="rag"] { border-color: rgba(16,185,129,0.35); --glow: 0 0 24px rgba(16,185,129,0.12); }
.node[data-id="rag"]::after { background: radial-gradient(circle, rgba(16,185,129,0.12), transparent 70%); }
.node[data-id="rag"] .icon { background: rgba(16,185,129,0.12); color: #10b981; }

.node[data-id="memory"] { border-color: rgba(236,72,153,0.35); --glow: 0 0 24px rgba(236,72,153,0.12); }
.node[data-id="memory"]::after { background: radial-gradient(circle, rgba(236,72,153,0.12), transparent 70%); }
.node[data-id="memory"] .icon { background: rgba(236,72,153,0.12); color: #ec4899; }

.node[data-id="registry"] { border-color: rgba(99,102,241,0.45); --glow: 0 0 30px rgba(99,102,241,0.18); }
.node[data-id="registry"]::after { background: radial-gradient(circle, rgba(99,102,241,0.18), transparent 70%); }
.node[data-id="registry"] .icon { background: rgba(99,102,241,0.15); color: #6366f1; }

.node[data-id="router"] { border-color: rgba(20,184,166,0.35); --glow: 0 0 24px rgba(20,184,166,0.12); }
.node[data-id="router"]::after { background: radial-gradient(circle, rgba(20,184,166,0.12), transparent 70%); }
.node[data-id="router"] .icon { background: rgba(20,184,166,0.12); color: #14b8a6; }

.node[data-id="detector"] { border-color: rgba(244,63,94,0.35); --glow: 0 0 24px rgba(244,63,94,0.12); }
.node[data-id="detector"]::after { background: radial-gradient(circle, rgba(244,63,94,0.12), transparent 70%); }
.node[data-id="detector"] .icon { background: rgba(244,63,94,0.12); color: #f43f5e; }

.node[data-id="tracker"] { border-color: rgba(249,115,22,0.35); --glow: 0 0 24px rgba(249,115,22,0.12); }
.node[data-id="tracker"]::after { background: radial-gradient(circle, rgba(249,115,22,0.12), transparent 70%); }
.node[data-id="tracker"] .icon { background: rgba(249,115,22,0.12); color: #f97316; }

.node[data-id="_agent_reply"] { border-color: rgba(0,229,255,0.45); --glow: 0 0 35px rgba(0,229,255,0.15); }
.node[data-id="_agent_reply"]::after { background: radial-gradient(circle, rgba(0,229,255,0.15), transparent 70%); }
.node[data-id="_agent_reply"] .icon { background: rgba(0,229,255,0.15); color: #00e5ff; }

/* Active (clicked) */
.node.active {
  animation: none !important;
  border-color: rgba(255,255,255,0.5) !important;
  box-shadow: 0 0 35px rgba(255,255,255,0.08) !important;
}

/* Faded state during hover */
.graph-container.hover-active .node.faded {
  opacity: 0.1;
  filter: grayscale(0.8);
  animation: none;
}

/* ========== CONNECTION LINES ========== */
.connection-line {
  fill: none;
  stroke-width: 1.5;
  opacity: 0.45;
  transition: opacity 0.4s ease, stroke-width 0.3s ease;
}
.graph-container.hover-active .connection-line.faded {
  opacity: 0.03;
}
.graph-container.hover-active .connection-line.highlighted {
  opacity: 1;
  stroke-width: 2.5;
}

/* Animated dash flow — simulates electricity traveling along the wire */
@keyframes flowDash {
  0% { stroke-dashoffset: 24; }
  100% { stroke-dashoffset: 0; }
}
.connection-line {
  stroke-dasharray: 8 4;
  animation: flowDash 1.5s linear infinite;
}
.connection-line.highlighted {
  stroke-dasharray: 10 3;
  animation: flowDash 0.5s linear infinite;
}

/* ========== DETAIL PANEL ========== */
.detail-panel {
  position: fixed;
  top: 0;
  right: -500px;
  width: 460px;
  height: 100vh;
  background: linear-gradient(180deg, #0f0d1a 0%, #0b0918 100%);
  border-left: 1.5px solid var(--border);
  z-index: 100;
  transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  box-shadow: -10px 0 50px rgba(0,0,0,0.6);
}
.detail-panel.open { right: 0; }

.detail-panel .panel-header {
  position: sticky;
  top: 0;
  background: linear-gradient(180deg, #0f0d1a 80%, transparent);
  padding: 1.5rem 1.5rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  z-index: 2;
}
.detail-panel .panel-close {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 34px;
  height: 34px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all 0.2s;
}
.detail-panel .panel-close:hover {
  border-color: var(--text);
  color: var(--text);
  background: rgba(255,255,255,0.05);
}
.detail-panel .panel-icon {
  width: 44px;
  height: 44px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.detail-panel .panel-title-block { flex: 1; min-width: 0; }
.detail-panel .panel-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.05rem;
  font-weight: 600;
}
.detail-panel .panel-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
}
.detail-panel .panel-body { padding: 0 1.5rem 2rem; }

.detail-section { margin-bottom: 1.8rem; }
.detail-section h3 {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
  font-weight: 600;
}
.detail-section pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem;
  font-size: 0.72rem;
  line-height: 1.75;
  overflow-x: auto;
  color: #c4b5fd;
  white-space: pre-wrap;
  word-break: break-word;
}
.detail-section p {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.75;
}
.detail-section .file-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 0.25rem 0.7rem;
  border-radius: 6px;
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.2);
  color: #a5b4fc;
}
.dep-list {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
}
.dep-list li {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  padding: 0.25rem 0.65rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.dep-list li:hover { transform: translateY(-1px); }
.dep-list.feeds li {
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.2);
  color: #a5b4fc;
}
.dep-list.feeds li:hover { background: rgba(99,102,241,0.15); }
.dep-list.fed-by li {
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.18);
  color: #67e8f9;
}
.dep-list.fed-by li:hover { background: rgba(0,229,255,0.12); }

/* ========== OVERLAY ========== */
.panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 99;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  backdrop-filter: blur(2px);
}
.panel-overlay.visible { opacity: 1; pointer-events: auto; }

/* ========== LEGEND ========== */
.legend {
  position: relative;
  z-index: 10;
  max-width: 1100px;
  margin: 0 auto 2.5rem;
  padding: 0 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.68rem;
  color: var(--text-dim);
  cursor: pointer;
  padding: 0.2rem 0.4rem;
  border-radius: 4px;
  transition: all 0.2s;
}
.legend-item:hover { color: var(--text-muted); background: rgba(255,255,255,0.03); }
.legend-swatch {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 900px) {
  .graph-container { height: 600px; }
  .node { min-width: 100px; padding: 0.45rem 0.6rem; }
  .node .icon { width: 26px; height: 26px; font-size: 0.85rem; }
  .node .info .name { font-size: 0.62rem; }
  .node .info .desc { display: none; }
  .detail-panel { width: 100vw; right: -110vw; }
}
@media (max-width: 600px) {
  .graph-container { height: 550px; }
  .node { min-width: 80px; gap: 0.3rem; }
  .node .info .name { font-size: 0.58rem; }
}
</style>
</head>
<body>

<header class="page-header">
  <h1>build_app() Architecture</h1>
  <p>How 10 objects wire together at FastAPI startup</p>
  <span class="fn-label">app/main.py &rarr; build_app()</span>
</header>

<div class="graph-container" id="graphContainer">
  <svg class="svg-layer" id="svgLayer">
    <defs>
      <!-- Arrowhead markers per source node color (normal + highlighted) -->
      <marker id="arrow-settings" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(245,158,11,0.55)"/></marker>
      <marker id="arrow-db" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(59,130,246,0.55)"/></marker>
      <marker id="arrow-pdf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(139,92,246,0.55)"/></marker>
      <marker id="arrow-rag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(16,185,129,0.55)"/></marker>
      <marker id="arrow-memory" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(236,72,153,0.55)"/></marker>
      <marker id="arrow-registry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(99,102,241,0.55)"/></marker>
      <marker id="arrow-router" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(20,184,166,0.55)"/></marker>
      <marker id="arrow-detector" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(244,63,94,0.55)"/></marker>
      <marker id="arrow-tracker" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="rgba(249,115,22,0.55)"/></marker>

      <marker id="arrow-settings-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="#f59e0b"/></marker>
      <marker id="arrow-db-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="#3b82f6"/></marker>

      <marker id="arrow-memory-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="#ec4899"/></marker>
      <marker id="arrow-registry-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="#6366f1"/></marker>
      <marker id="arrow-router-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="#14b8a6"/></marker>
      <marker id="arrow-detector-hl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 8 5 L 0 9 z" fill="#f43f5e"/></marker>

  </svg>
</div>

<div class="legend" id="legend"></div>

<div class="panel-overlay" id="panelOverlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <div class="panel-icon" id="panelIcon"></div>
    <div class="panel-title-block">
      <div class="panel-name" id="panelName"></div>
      <div class="panel-desc" id="panelDesc"></div>
    </div>
    <button class="panel-close" id="panelClose">&times;</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
/* ============================================================
   DATA MODEL — 10 objects created in build_app()
   ============================================================ */
const NODES = [
  {
    id: 'settings', name: 'settings', icon: '\u2699\ufe0f',
    desc: 'Centralized configuration',
    color: 'rgba(245,158,11,0.5)', colorSolid: '#f59e0b',
    x: 50, y: 6,
    feeds: ['db', 'rag', 'router', 'detector', 'tracker', 'rate_limiter'],
    code: 'settings = get_settings()\n# Reads MRC_* env vars via pydantic BaseSettings\n# Provides: db_path, chroma_dir, model names,\n# rate limits, hallucination thresholds...',
    explanation: 'The single source of truth for all configuration. Created first because almost every other object depends on paths, model names, or threshold values defined here.',
    file: 'app/config.py'
  },

// Build directed edges from each node's feeds array
const EDGES = [];
NODES.forEach(function(node) {
  node.feeds.forEach(function(targetId) {
    if (!NODES.find(function(n) { return n.id === targetId; })) return;
    EDGES.push({ from: node.id, to: targetId, color: node.color, colorSolid: node.colorSolid, sourceId: node.id });
  });
});

// Lookup map
const nodeMap = {};
NODES.forEach(function(n) { nodeMap[n.id] = n; });

/* ============================================================
   RENDER NODES
   ============================================================ */
var container = document.getElementById('graphContainer');
var nodeEls = {};

NODES.forEach(function(node) {
  var el = document.createElement('div');
  el.className = 'node';
  el.dataset.id = node.id;
  el.style.left = node.x + '%';
  el.style.top = node.y + '%';
  el.style.transform = 'translate(-50%, -50%)';
  el.innerHTML =
    '<div class="icon">' + node.icon + '</div>' +
    '<div class="info">' +
      '<div class="name">' + node.name + '</div>' +
      '<div class="desc">' + node.desc + '</div>' +
    '</div>';
  container.appendChild(el);
  nodeEls[node.id] = el;
});

/* ============================================================
   RENDER SVG CONNECTIONS (curved paths with directional arrows)
   ============================================================ */
var svg = document.getElementById('svgLayer');
var edgeEls = [];

function getNodeCenter(id) {
  var el = nodeEls[id];
  var cRect = container.getBoundingClientRect();
  var nRect = el.getBoundingClientRect();
  return {
    x: nRect.left + nRect.width / 2 - cRect.left,
    y: nRect.top + nRect.height / 2 - cRect.top
  };
}

function renderEdges() {
  edgeEls.length = 0;
  var old = svg.querySelectorAll('.connection-line');
  for (var i = 0; i < old.length; i++) old[i].remove();

  EDGES.forEach(function(edge, idx) {
    var from = getNodeCenter(edge.from);
    var to = getNodeCenter(edge.to);
    var dx = to.x - from.x;
    var dy = to.y - from.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return;

    // Shorten ends so arrows don't overlap nodes
    var pad = 30;
    var ux = dx / dist;
    var uy = dy / dist;
    var x1 = from.x + ux * pad;
    var y1 = from.y + uy * pad;
    var x2 = to.x - ux * pad;
    var y2 = to.y - uy * pad;

    // Quadratic bezier curve — perpendicular offset for organic feel
    var mx = (x1 + x2) / 2;
    var my = (y1 + y2) / 2;
    var curveMag = Math.min(dist * 0.1, 35);
    var sign = (idx % 2 === 0) ? 1 : -1;
    var px = -uy * curveMag * sign;
    var py = ux * curveMag * sign;
    var cx = mx + px;
    var cy = my + py;

    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + x1 + ' ' + y1 + ' Q ' + cx + ' ' + cy + ' ' + x2 + ' ' + y2);
    path.setAttribute('class', 'connection-line');
    path.setAttribute('stroke', edge.color);
    path.setAttribute('marker-end', 'url(#arrow-' + edge.sourceId + ')');
    path.dataset.from = edge.from;
    path.dataset.to = edge.to;
    path.dataset.sourceId = edge.sourceId;
    path.style.animationDelay = (idx * 0.12) + 's';
    svg.appendChild(path);
    edgeEls.push(path);
  });
}

renderEdges();

var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderEdges, 80);
});

/* ============================================================
   HOVER: HIGHLIGHT DIRECT CONNECTIONS, FADE EVERYTHING ELSE
   ============================================================ */
var hoverTimer = null;

function getConnected(nodeId) {
  var set = {};
  set[nodeId] = true;
  EDGES.forEach(function(e) {
    if (e.from === nodeId) set[e.to] = true;
    if (e.to === nodeId) set[e.from] = true;
  });
  return set;
}

function applyHover(nodeId) {
  var connected = getConnected(nodeId);
  container.classList.add('hover-active');

  NODES.forEach(function(n) {
    if (connected[n.id]) {
      nodeEls[n.id].classList.remove('faded');
    } else {
      nodeEls[n.id].classList.add('faded');
    }
  });

  edgeEls.forEach(function(path) {
    var isConn = (path.dataset.from === nodeId || path.dataset.to === nodeId);
    if (isConn) {
      path.classList.add('highlighted');
      path.classList.remove('faded');
      path.setAttribute('marker-end', 'url(#arrow-' + path.dataset.sourceId + '-hl)');
    } else {
      path.classList.remove('highlighted');
      path.classList.add('faded');
    }
  });
}

function clearHover() {
  container.classList.remove('hover-active');
  NODES.forEach(function(n) { nodeEls[n.id].classList.remove('faded'); });
  edgeEls.forEach(function(path) {
    path.classList.remove('highlighted', 'faded');
    path.setAttribute('marker-end', 'url(#arrow-' + path.dataset.sourceId + ')');
  });
}

NODES.forEach(function(node) {
  var el = nodeEls[node.id];
  el.addEventListener('mouseenter', function() {
    clearTimeout(hoverTimer);
    applyHover(node.id);
  });
  el.addEventListener('mouseleave', function() {
    hoverTimer = setTimeout(clearHover, 150);
  });
});

/* ============================================================
   CLICK: DETAIL PANEL with code, explanation, dependencies
   ============================================================ */
var panel = document.getElementById('detailPanel');
var overlay = document.getElementById('panelOverlay');
var panelIcon = document.getElementById('panelIcon');
var panelName = document.getElementById('panelName');
var panelDesc = document.getElementById('panelDesc');
var panelBody = document.getElementById('panelBody');
var panelClose = document.getElementById('panelClose');
var activeNodeId = null;

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function openPanel(nodeId) {
  var node = nodeMap[nodeId];
  if (!node) return;

  if (activeNodeId) nodeEls[activeNodeId].classList.remove('active');
  activeNodeId = nodeId;
  nodeEls[nodeId].classList.add('active');

  panelIcon.textContent = node.icon;
  panelIcon.style.background = node.color.replace(/0\.\d+\)/, '0.15)');
  panelIcon.style.border = '1px solid ' + node.color.replace(/0\.\d+\)/, '0.25)');
  panelIcon.style.color = node.colorSolid;
  panelName.textContent = node.name;
  panelDesc.textContent = node.desc;

  // Who I feed (outgoing)
  var iUse = node.feeds.filter(function(f) { return !!nodeMap[f]; });
  // Who feeds me (incoming)
  var usesMe = EDGES.filter(function(e) { return e.to === nodeId; }).map(function(e) { return e.from; });

  var html =
    '<div class="detail-section">' +
      '<h3>Creation Code</h3>' +
      '<pre>' + escHtml(node.code) + '</pre>' +
    '</div>' +
    '<div class="detail-section">' +
      '<h3>What It Does</h3>' +
      '<p>' + node.explanation + '</p>' +
    '</div>' +
    '<div class="detail-section">' +
      '<h3>Source File</h3>' +
      '<span class="file-badge">' + node.file + '</span>' +
    '</div>';

  if (iUse.length) {
    html +=
      '<div class="detail-section">' +
        '<h3>I Feed &rarr; (' + iUse.length + ')</h3>' +
        '<ul class="dep-list feeds">' +
          iUse.map(function(id) { return '<li data-nav="' + id + '">' + id + '</li>'; }).join('') +
        '</ul>' +
      '</div>';
  }
  if (usesMe.length) {
    html +=
      '<div class="detail-section">' +
        '<h3>Fed By &larr; (' + usesMe.length + ')</h3>' +
        '<ul class="dep-list fed-by">' +
          usesMe.map(function(id) { return '<li data-nav="' + id + '">' + id + '</li>'; }).join('') +
        '</ul>' +
      '</div>';
  }

  panelBody.innerHTML = html;

  // Make dependency tags clickable to navigate between nodes
  var navItems = panelBody.querySelectorAll('[data-nav]');
  for (var i = 0; i < navItems.length; i++) {
    navItems[i].addEventListener('click', (function(targetId) {
      return function() { openPanel(targetId); };
    })(navItems[i].dataset.nav));
  }

  panel.classList.add('open');
  overlay.classList.add('visible');
}

function closePanel() {
  panel.classList.remove('open');
  overlay.classList.remove('visible');
  if (activeNodeId) {
    nodeEls[activeNodeId].classList.remove('active');
    activeNodeId = null;
  }
}

NODES.forEach(function(node) {
  nodeEls[node.id].addEventListener('click', function(e) {
    e.stopPropagation();
    openPanel(node.id);
  });
});

panelClose.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

/* ============================================================
   LEGEND (clickable — opens detail panel)
   ============================================================ */
var legendEl = document.getElementById('legend');
NODES.forEach(function(node) {
  var item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML =
    '<span class="legend-swatch" style="background:' + node.colorSolid + '"></span>' +
    '<span class="mono" style="font-size:0.65rem">' + node.name + '</span>';
  item.addEventListener('click', function() { openPanel(node.id); });
  legendEl.appendChild(item);
});
</script>
