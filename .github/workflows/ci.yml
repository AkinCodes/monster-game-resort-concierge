name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: flake8 app tests
      - name: Run tests
        env:
          MRC_ENVIRONMENT: dev
          MRC_DATABASE_URL: sqlite:///./test_ci.db
          MRC_OPENAI_API_KEY: dummy
          MRC_API_KEY: dummy
          MRC_JWT_SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
          MRC_ANTHROPIC_API_KEY: dummy
        run: pytest --cov=app --cov-report=term-missing
