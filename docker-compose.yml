version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MRC_ENVIRONMENT=prod
      - MRC_API_KEY=${MRC_API_KEY}
      - MRC_OPENAI_API_KEY=${MRC_OPENAI_API_KEY}
      - MRC_DATABASE_URL=sqlite:////data/monster_resort.db
    volumes:
      - ./data:/data
      - ./generated_pdfs:/app/generated_pdfs
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=sqlite:///mlflow/mlflow.db
      - --default-artifact-root=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  prometheus_data:
  grafana_data:
  mlflow_data:
